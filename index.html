<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>[自分の名前]のエンジニア学習ダッシュボード</title>
    <style>
        /* 背景のパーティクルを画面全体に固定 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 背景色 */
            z-index: -1; /* コンテンツの背面に配置 */
            top: 0;
            left: 0;
        }

        body {
            margin: 0;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        #main-title {
            color: #00ffab;
            border-bottom: 2px solid #00ffab;
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 255, 171, 0.5);
        }

        ul {
            list-style: none;
            padding: 0;
            width: 100%;
            max-width: 500px;
        }

        .link-card {
            background-color: rgba(45, 45, 45, 0.8); /* 少し透けさせる */
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 20px;
            backdrop-filter: blur(5px); /* 背景をぼかすおしゃれ加工 */
            transition: transform 0.2s;
        }

        .link-card:hover {
            transform: scale(1.02);
            border-color: #00ffab;
        }

        .link-card a {
            color: #00ffab;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <h1 id="main-title">[自分の名前]のエンジニア学習ダッシュボード</h1>
        <p>ITエンジニアを目指して勉強中です。JavaScriptで背景を動かしています。</p>
    </header>

    <main>
        <ul>
            <li class="link-card">
                <a href="https://developer.mozilla.org/ja/" target="_blank">MDN Web Docs</a>
                ー Web開発の標準ドキュメント。
            </li>
            <li class="link-card">
                <a href="https://qiita.com/" target="_blank">Qiita</a>
                ー エンジニアの技術知識共有サービス。
            </li>
            <li class="link-card">
                <a href="https://www.ipa.go.jp/shiken/kubun/fe.html" target="_blank">IPA 基本情報技術者試験</a>
                ー 試験の公式サイト。
            </li>
        </ul>
    </main>

    <footer>
        <p>© 2026 [自分の名前]</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 }, // 粒子の数
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": {
                    "enable": true, // 線でつなぐ
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2, // 動くスピード
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out"
                }
            },
            "interactivity": {
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" } // マウスを乗せると逃げる
                }
            }
        });
    </script>
</body>
</html>
